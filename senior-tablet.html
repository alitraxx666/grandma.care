<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F3F0E5">
  <link rel="icon" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Senior Tablet | Grandma.care</title>

  <style>
    :root {
      --bg:#F3F0E5;
      --card:#FFFFFF;
      --text:#234A53;
      --muted:#4E707A;
      --accent:#204A53;
      --danger:#B42318;
      --success:#1F7A4D;
      --border:#D8D1C1;
      --shadow:0 14px 40px rgba(35,74,83,0.15);
      --yellow:#FFF3B0;
      --done:#DFF3E8;
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow:hidden;
    }

    .tablet {
      min-height:100vh;
      display:grid;
      grid-template-columns:40% 60%;
    }

    .photo-side {
      position:relative;
      min-height:100vh;
      overflow:hidden;
      background:#ddd;
    }

    .photo-side img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .photo-label {
      position:absolute;
      left:18px;
      bottom:18px;
      background:rgba(255,255,255,0.9);
      padding:10px 18px;
      border-radius:999px;
      font-size:1.05rem;
      font-weight:900;
      color:var(--accent);
    }

    .app-side {
      min-height:100vh;
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .clock {
      font-size:1.7rem;
      font-weight:900;
      color:var(--accent);
      margin-bottom:8px;
      line-height:1.15;
    }

    .hello {
      font-size:2.3rem;
      font-weight:900;
      margin-bottom:12px;
    }

    .card {
      width:min(760px,100%);
      background:white;
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
      border:1px solid var(--border);
    }

    .active-reminder {
      background:var(--yellow);
      border:4px solid var(--accent);
    }

    .done-reminder {
      background:var(--done);
      border:4px solid var(--success);
    }

    .time {
      font-size:1.8rem;
      font-weight:900;
      color:var(--accent);
      margin-bottom:8px;
    }

    .task {
      font-size:2.4rem;
      line-height:1.08;
      font-weight:900;
      margin-bottom:12px;
    }

    .instruction {
      font-size:1.1rem;
      color:var(--muted);
      margin-bottom:18px;
    }

    .buttons {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    button {
      border:none;
      border-radius:24px;
      padding:20px 14px;
      font-size:1.3rem;
      font-weight:900;
      cursor:pointer;
      color:white;
    }

    .yes {
      background:var(--success);
    }

    .help {
      background:var(--danger);
    }

    .call {
      background:var(--accent);
      width:100%;
      margin-top:12px;
    }

    .status {
      margin-top:14px;
      font-size:1.1rem;
      font-weight:900;
    }

    .upcoming,
    .pillbox,
    .family-note {
      width:min(760px,100%);
      margin-top:12px;
      background:rgba(255,255,255,0.78);
      border:1px solid var(--border);
      border-radius:22px;
      padding:12px 16px;
      text-align:left;
    }

    .section-title {
      font-size:.85rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:900;
      color:var(--muted);
      margin-bottom:6px;
    }

    .upcoming-text,
    .family-text {
      font-size:1.05rem;
      font-weight:800;
    }

    .pill-list {
      display:grid;
      gap:8px;
    }

    .pill-row {
      background:white;
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }

    .pill-row.active {
      background:var(--yellow);
      border:3px solid var(--accent);
    }

    .pill-row.done {
      background:var(--done);
      color:var(--success);
      border:2px solid var(--success);
    }

    .pill-time {
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
    }

    @media(max-width:850px) {
      body {
        overflow:auto;
      }

      .tablet {
        grid-template-columns:1fr;
      }

      .photo-side {
        min-height:30vh;
      }

      .app-side {
        min-height:70vh;
        padding:16px;
      }

      .task {
        font-size:2rem;
      }

      .buttons {
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="tablet">

  <div class="photo-side">
    <img id="familyPhoto" src="family-photo-1.jpg" alt="Family photo slideshow">
    <div class="photo-label">Family Photos ❤️</div>
  </div>

  <div class="app-side">

    <div class="clock" id="clockDisplay">Loading time...</div>
    <div class="hello" id="helloText">Hi Barbara ❤️</div>

    <div class="card active-reminder" id="reminderCard">
      <div class="time" id="reminderTime">9:00 AM</div>
      <div class="task" id="reminderTask">Take your prescription pills.</div>
      <div class="instruction" id="instructionText">Please press one button.</div>

      <div class="buttons" id="buttonArea">
        <button class="yes" onclick="taskDone()">✅ Yes, I did it</button>
        <button class="help" onclick="needHelp()">🆘 No, I need help</button>
      </div>

      <div class="status" id="statusMessage"></div>
    </div>

    <div class="pillbox">
      <div class="section-title">Today's Medicines</div>
      <div class="pill-list" id="pillList"></div>
    </div>

    <div class="upcoming">
      <div class="section-title">Upcoming Medication</div>
      <div class="upcoming-text" id="upcomingReminder">
        Loading next reminder...
      </div>
    </div>

    <div class="family-note">
      <div class="section-title">Family Note ❤️</div>
      <div class="family-text" id="familyNote">
        Nicholas set this up for you.
      </div>
      <button class="call" onclick="callFamily()">📞 Call Nick</button>
    </div>

  </div>

</div>

<audio id="reminderBell" preload="auto">
  <source src="bell.mp3" type="audio/mpeg">
</audio>

<audio id="successSound" preload="auto">
  <source src="success.mp3" type="audio/mpeg">
</audio>

<script>
  const photos = [
    "family-photo-1.jpg",
    "family-photo-2.jpg",
    "family-photo-3.jpg",
    "family-photo-4.jpg"
  ];

  let currentPhoto = 0;
  let appData = {};
  let medications = [];
  let todaysMeds = [];
  let currentMed = null;
  let lastReminderId = null;

  function todayLocalDateKey() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  function clearOldCompletionData() {
    const today = todayLocalDateKey();
    const lastDate = localStorage.getItem("grandmaLastCompletedDate");

    if (lastDate !== today) {
      localStorage.removeItem("grandmaLastCompleted");
      localStorage.removeItem("grandmaReminderCompleted");
      localStorage.removeItem("grandmaAlert");

      Object.keys(localStorage).forEach(key => {
        if (key.startsWith("completed-") && !key.startsWith(`completed-${today}-`)) {
          localStorage.removeItem(key);
        }
      });

      localStorage.setItem("grandmaLastCompletedDate", today);
    }
  }

  function rotatePhotos() {
    currentPhoto = (currentPhoto + 1) % photos.length;
    document.getElementById("familyPhoto").src = photos[currentPhoto];
  }

  function playReminderBell() {
    const bell = document.getElementById("reminderBell");

    if (bell) {
      bell.currentTime = 0;
      bell.play().catch(() => {
        console.log("Bell sound may be blocked until the tablet is tapped once.");
      });
    }
  }

  function playSuccessSound() {
    const sound = document.getElementById("successSound");

    if (sound) {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }
  }

  function loadData() {
    const savedData = localStorage.getItem("grandmaDashboardData");

    appData = {
      senior: "Barbara",
      caregiver: "Nick",
      familyMessage: "We love you.",
      medications: [
        {
          id: 1,
          name: "prescription pills",
          time: "09:00",
          frequency: "daily",
          days: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
        }
      ]
    };

    if (savedData) {
      appData = {
        ...appData,
        ...JSON.parse(savedData)
      };
    }

    medications = appData.medications || [];

    document.getElementById("helloText").textContent =
      `Hi ${appData.senior || "Barbara"} ❤️`;

    document.getElementById("familyNote").textContent =
      `${appData.caregiver || "Nick"} set this up for you. ${appData.familyMessage || ""}`;
  }

  function getTodayShort() {
    return new Date().toLocaleDateString("en-US", {
      weekday: "short"
    });
  }

  function getCompletedKey(med) {
    const today = todayLocalDateKey();
    return `completed-${today}-${med.id}`;
  }

  function isCompleted(med) {
    return localStorage.getItem(getCompletedKey(med)) === "true";
  }

  function getTodaysMeds() {
    const today = getTodayShort();

    return medications
      .filter(med => med.days && med.days.includes(today))
      .sort((a, b) => a.time.localeCompare(b.time));
  }

  function chooseCurrentMedication() {
    todaysMeds = getTodaysMeds();

    if (todaysMeds.length === 0) {
      currentMed = null;
      return;
    }

    const notCompleted = todaysMeds.find(med => !isCompleted(med));

    if (notCompleted) {
      currentMed = notCompleted;
    } else {
      currentMed = todaysMeds[todaysMeds.length - 1];
    }
  }

  function updateMainCard() {
    const card = document.getElementById("reminderCard");
    const buttonArea = document.getElementById("buttonArea");
    const status = document.getElementById("statusMessage");

    card.classList.remove("active-reminder", "done-reminder");

    if (!currentMed) {
      document.getElementById("reminderTime").textContent =
        "No medicines today";

      document.getElementById("reminderTask").textContent =
        "Enjoy your day ❤️";

      document.getElementById("instructionText").textContent =
        "There are no medication reminders scheduled for today.";

      buttonArea.style.display = "none";
      status.textContent = "";
      return;
    }

    const completed = isCompleted(currentMed);

    document.getElementById("reminderTime").textContent =
      formatTime(currentMed.time);

    document.getElementById("reminderTask").textContent =
      completed
        ? `✅ You took ${currentMed.name}.`
        : `Take ${currentMed.name}.`;

    document.getElementById("instructionText").textContent =
      completed
        ? "Great job. This has been marked complete."
        : "Please press one button.";

    if (completed) {
      card.classList.add("done-reminder");
      buttonArea.style.display = "none";
      status.textContent = "";
    } else {
      card.classList.add("active-reminder");
      buttonArea.style.display = "grid";
      status.textContent = "";

      if (lastReminderId !== currentMed.id) {
        playReminderBell();
        lastReminderId = currentMed.id;
      }
    }
  }

  function renderPillList() {
    const list = document.getElementById("pillList");

    if (todaysMeds.length === 0) {
      list.innerHTML =
        `<div class="pill-row">No medicines scheduled today.</div>`;
      return;
    }

    list.innerHTML = todaysMeds.map(med => {
      const completed = isCompleted(med);
      const active = currentMed && med.id === currentMed.id && !completed;

      return `
        <div class="pill-row ${completed ? "done" : ""} ${active ? "active" : ""}">
          <div>
            ${completed ? "✅" : "💊"} ${med.name}
          </div>
          <div class="pill-time">
            ${formatTime(med.time)}
          </div>
        </div>
      `;
    }).join("");
  }

  function updateUpcomingReminder() {
    if (todaysMeds.length === 0) {
      document.getElementById("upcomingReminder").textContent =
        "No more medicines today.";
      return;
    }

    const nextMed = todaysMeds.find(med => !isCompleted(med));

    if (nextMed) {
      document.getElementById("upcomingReminder").textContent =
        `${formatTime(nextMed.time)} — Take ${nextMed.name}`;
    } else {
      document.getElementById("upcomingReminder").textContent =
        "All medicines are complete for today ✅";
    }
  }

  function refreshTablet() {
    clearOldCompletionData();
    loadData();
    chooseCurrentMedication();
    updateMainCard();
    renderPillList();
    updateUpcomingReminder();
  }

  function taskDone() {
    if (!currentMed) return;

    localStorage.setItem(getCompletedKey(currentMed), "true");
    localStorage.setItem("grandmaLastCompletedDate", todayLocalDateKey());

    const senior = appData.senior || "Barbara";

    localStorage.setItem("grandmaLastCompleted", JSON.stringify({
      senior: senior,
      task: `Took ${currentMed.name}`,
      time: new Date().toLocaleString(),
      status: "completed"
    }));

    localStorage.removeItem("grandmaAlert");

    playSuccessSound();

    document.getElementById("statusMessage").textContent =
      "🎉 Great job! Your medication has been marked complete.";

    refreshTablet();
  }

  function needHelp() {
    const senior = appData.senior || "Barbara";
    const medName = currentMed ? currentMed.name : "medication";

    document.getElementById("statusMessage").textContent =
      "Help requested. Your caregiver should be contacted.";

    localStorage.setItem("grandmaAlert", JSON.stringify({
      senior: senior,
      message: `${senior} requested help with ${medName}.`,
      time: new Date().toLocaleString(),
      status: "help requested"
    }));

    playReminderBell();
  }

  function callFamily() {
    const caregiver = appData.caregiver || "Alison";

    document.getElementById("statusMessage").textContent =
      `Calling ${caregiver}...`;
  }

  function formatTime(time) {
    if (!time) return "";

    const parts = time.split(":");
    let hour = parseInt(parts[0]);
    const minute = parts[1];

    const ampm = hour >= 12 ? "PM" : "AM";
    hour = hour % 12 || 12;

    return `${hour}:${minute} ${ampm}`;
  }

  function updateClock() {
    const now = new Date();

    const dateString = now.toLocaleDateString("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric"
    });

    const timeString = now.toLocaleTimeString("en-US", {
      hour: "numeric",
      minute: "2-digit"
    });

    document.getElementById("clockDisplay").innerHTML =
      `${dateString}<br>${timeString}`;
  }

  function removeOldServiceWorkerCache() {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(registration => {
          registration.unregister();
        });
      });
    }

    if ("caches" in window) {
      caches.keys().then(names => {
        names.forEach(name => caches.delete(name));
      });
    }
  }

  removeOldServiceWorkerCache();
  clearOldCompletionData();
  refreshTablet();
  updateClock();

  setInterval(rotatePhotos, 5000);
  setInterval(updateClock, 1000);
  setInterval(refreshTablet, 10000);

  setInterval(() => {
    if (currentMed && !isCompleted(currentMed)) {
      playReminderBell();
    }
  }, 60000);
</script>

</body>
</html>
