<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Senior Tablet | Grandma.care</title>

  <style>
    :root {
      --bg:#F3F0E5;
      --card:#FFFFFF;
      --text:#234A53;
      --muted:#4E707A;
      --accent:#204A53;
      --danger:#B42318;
      --success:#1F7A4D;
      --border:#D8D1C1;
      --shadow:0 14px 40px rgba(35,74,83,0.15);
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow:hidden;
    }

    .tablet {
      min-height:100vh;
      display:grid;
      grid-template-columns: 44% 56%;
      gap:0;
    }

    .photo-side {
      position:relative;
      background:#ddd;
      min-height:100vh;
      overflow:hidden;
    }

    .photo-side img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .photo-label {
      position:absolute;
      left:26px;
      bottom:26px;
      background:rgba(255,255,255,0.88);
      color:var(--accent);
      padding:14px 22px;
      border-radius:999px;
      font-size:1.4rem;
      font-weight:900;
    }

    .app-side {
      min-height:100vh;
      padding:32px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .clock {
      font-size:2rem;
      font-weight:900;
      color:var(--accent);
      margin-bottom:16px;
      line-height:1.2;
    }

    .hello {
      font-size:2.8rem;
      font-weight:900;
      margin-bottom:22px;
    }

    .card {
      background:white;
      width:min(760px,100%);
      border-radius:34px;
      padding:36px;
      box-shadow:var(--shadow);
      border:1px solid var(--border);
    }

    .time {
      font-size:2rem;
      font-weight:900;
      color:var(--accent);
      margin-bottom:12px;
    }

    .task {
      font-size:3rem;
      line-height:1.08;
      font-weight:900;
      margin-bottom:20px;
    }

    .instruction {
      font-size:1.35rem;
      color:var(--muted);
      margin-bottom:28px;
    }

    .buttons {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    button {
      border:none;
      border-radius:28px;
      padding:26px 22px;
      font-size:1.65rem;
      font-weight:900;
      cursor:pointer;
      color:white;
    }

    .yes {
      background:var(--success);
    }

    .help {
      background:var(--danger);
    }

    .status {
      margin-top:22px;
      font-size:1.3rem;
      font-weight:900;
    }

    .upcoming {
      width:min(760px,100%);
      margin-top:20px;
      background:rgba(255,255,255,0.75);
      border:1px solid var(--border);
      border-radius:24px;
      padding:18px 22px;
      text-align:left;
    }

    .upcoming-title {
      font-size:1rem;
      text-transform:uppercase;
      letter-spacing:0.08em;
      font-weight:900;
      color:var(--muted);
      margin-bottom:6px;
    }

    .upcoming-text {
      font-size:1.25rem;
      font-weight:800;
      color:var(--text);
    }

    @media(max-width:850px) {
      body {
        overflow:auto;
      }

      .tablet {
        grid-template-columns:1fr;
      }

      .photo-side {
        min-height:36vh;
      }

      .app-side {
        min-height:64vh;
        padding:22px;
      }

      .task {
        font-size:2.2rem;
      }

      .buttons {
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="tablet">

  <div class="photo-side">
    <img id="familyPhoto" src="family-photo-1.jpg" alt="Family photo slideshow">
    <div class="photo-label">
      Family Photos ❤️
    </div>
  </div>

  <div class="app-side">

    <div class="clock" id="clockDisplay">
      Loading time...
    </div>

    <div class="hello" id="helloText">
      Hi Barbara ❤️
    </div>

    <div class="card">

      <div class="time" id="reminderTime">
        9:00 AM
      </div>

      <div class="task" id="reminderTask">
        Take your prescription pills.
      </div>

      <div class="instruction">
        Please press one button.
      </div>

      <div class="buttons">
        <button class="yes" onclick="taskDone()">
          ✅ Yes, I did it
        </button>

        <button class="help" onclick="needHelp()">
          🆘 No, I need help
        </button>
      </div>

      <div class="status" id="statusMessage"></div>

    </div>

    <div class="upcoming">
      <div class="upcoming-title">
        Upcoming Reminder
      </div>
      <div class="upcoming-text" id="upcomingReminder">
        3:00 PM — Take your afternoon prescription pills.
      </div>
    </div>

  </div>

</div>

<script>
  const photos = [
    "family-photo-1.jpg",
    "family-photo-2.jpg",
    "family-photo-3.jpg",
    "family-photo-4.jpg""
  ];

  let currentPhoto = 0;

  function rotatePhotos() {
    currentPhoto = (currentPhoto + 1) % photos.length;
    document.getElementById("familyPhoto").src = photos[currentPhoto];
  }

  setInterval(rotatePhotos, 5000);

  const savedData = localStorage.getItem("grandmaDashboardData");

  if (savedData) {
    const data = JSON.parse(savedData);

    const senior = data.senior || "Barbara";
    const medication = data.medication || "prescription pills";
    const medTime = formatTime(data.medicationTime) || "9:00 AM";

    document.getElementById("helloText").textContent =
      `Hi ${senior} ❤️`;

    document.getElementById("reminderTime").textContent =
      medTime;

    document.getElementById("reminderTask").textContent =
      `Take your ${medication}.`;
  }

  function taskDone() {
    document.getElementById("statusMessage").textContent =
      "Great job. Your caregiver will know this was completed.";
  }

  function needHelp() {
    document.getElementById("statusMessage").textContent =
      "Help requested. Your caregiver should be contacted.";
  }

  function formatTime(time) {
    if (!time) return "";

    const parts = time.split(":");
    let hour = parseInt(parts[0]);
    const minute = parts[1];

    const ampm = hour >= 12 ? "PM" : "AM";
    hour = hour % 12 || 12;

    return `${hour}:${minute} ${ampm}`;
  }

  function updateClock() {
    const now = new Date();

    const dateString = now.toLocaleDateString("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric"
    });

    const timeString = now.toLocaleTimeString("en-US", {
      hour: "numeric",
      minute: "2-digit"
    });

    document.getElementById("clockDisplay").innerHTML =
      `${dateString}<br>${timeString}`;
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
